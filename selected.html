<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Selection</title>

<link rel="stylesheet"
href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"

</head>

<body>

<div class="container">

</div>

.innerHTML=
localStorage.getItem("selectedFont");

</script>

</body>

</html>
